name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag -a v0.2.1 -m "v0.2.1" && git push origin v0.2.1
#
# Pipeline:
#   verify         -> tag == VERSION
#   windows        -> PyInstaller onedir + Inno Setup installer (LapTest-Setup-<ver>.exe)
#   macos          -> PyInstaller .app, zipped (LapTest-<ver>-macos.zip)
#   github-release -> attach both, notes from the CHANGELOG section
#
# No registry credentials needed: artifacts go to a GitHub Release via GITHUB_TOKEN.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches VERSION
        run: |
          file="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=$tag VERSION=$file"
          if [ "$file" != "$tag" ]; then
            echo "::error::Tag ($tag) != VERSION ($file). Bump VERSION before tagging."
            exit 1
          fi

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Build (PyInstaller onedir)
        run: python -m PyInstaller --noconfirm --clean laptest.spec
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" laptest.iss
          $ver = (Get-Content VERSION -Raw).Trim()
          if (!(Test-Path "LapTest-Setup-$ver.exe")) { throw "installer was not produced" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: LapTest-Setup-*.exe
          if-no-files-found: error

  macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Build (.app bundle)
        run: python -m PyInstaller --noconfirm --clean laptest.spec
      - name: Package .app as zip
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          ditto -c -k --keepParent "dist/LapTest.app" "LapTest-${ver}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: LapTest-*-macos.zip
          if-no-files-found: error

  github-release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - name: Extract this version's CHANGELOG section
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md; fi
          echo "---- notes ----"; cat RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: release-files/*
          fail_on_unmatched_files: true
